<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History · JINWOONG-TEAM-Hackertone2026</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

  <div class="mx-auto max-w-md min-h-screen bg-slate-50 pb-24 relative">

    <!-- Top bar -->
    <header class="flex items-center justify-between px-5 pt-6 pb-4 relative">
      <a href="home.html" class="w-9 h-9 flex items-center justify-center rounded-full bg-white shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <h1 class="text-lg font-bold">History</h1>
      <button id="filterBtn" class="w-9 h-9 flex items-center justify-center rounded-full bg-white shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-7.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
        </svg>
      </button>
      <div id="filterMenu" class="hidden absolute right-5 top-16 bg-white rounded-2xl shadow-lg p-2 w-36 z-10 text-sm">
        <button data-filter="all" class="filter-option w-full text-left px-3 py-2 rounded-xl hover:bg-slate-50 font-semibold text-indigo-600">All</button>
        <button data-filter="human" class="filter-option w-full text-left px-3 py-2 rounded-xl hover:bg-slate-50">Human</button>
        <button data-filter="synthetic" class="filter-option w-full text-left px-3 py-2 rounded-xl hover:bg-slate-50">Synthetic</button>
        <button data-filter="uncertain" class="filter-option w-full text-left px-3 py-2 rounded-xl hover:bg-slate-50">Uncertain</button>
      </div>
    </header>

    <!-- Summary strip -->
    <section class="px-5 mb-2">
      <div class="flex gap-3 text-sm">
        <div class="flex-1 rounded-2xl bg-white shadow-sm px-4 py-3">
          <p class="text-slate-400 text-xs">Total scans</p>
          <p class="text-xl font-bold text-slate-900" id="totalCount">–</p>
        </div>
        <div class="flex-1 rounded-2xl bg-white shadow-sm px-4 py-3">
          <p class="text-slate-400 text-xs">Flagged</p>
          <p class="text-xl font-bold text-red-500" id="flaggedCount">–</p>
        </div>
      </div>
    </section>

    <p id="offlineNotice" class="hidden px-5 mb-2 text-xs text-amber-600 bg-amber-50 mx-5 rounded-xl px-3 py-2"></p>

    <!-- List -->
    <main class="px-5 mt-4 space-y-3" id="historyList"></main>

    <!-- Detail modal -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/40 z-20 flex items-end justify-center">
      <div class="bg-white rounded-t-3xl w-full max-w-md p-5 max-h-[80vh] overflow-y-auto">
        <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>
        <div class="flex items-center justify-between mb-1">
          <h2 id="modalFile" class="font-bold text-base"></h2>
          <span id="modalStatus" class="text-[10px] font-semibold px-2 py-0.5 rounded-full"></span>
        </div>
        <p id="modalTime" class="text-xs text-slate-400 mb-4"></p>

        <div class="flex items-center justify-between bg-slate-50 rounded-2xl p-4 mb-4">
          <span class="text-sm font-semibold">Risk Score</span>
          <span id="modalRisk" class="text-2xl font-extrabold"></span>
        </div>

        <div id="modalAccentWrap" class="mb-4">
          <p class="text-sm font-semibold mb-2">Accent Pattern</p>
          <div id="modalAccent" class="space-y-2"></div>
        </div>

        <div>
          <p class="text-sm font-semibold mb-2">Evidence</p>
          <ul id="modalEvidence" class="text-sm text-slate-600 space-y-1.5 list-disc pl-5"></ul>
        </div>

        <button id="modalClose" class="w-full mt-5 bg-slate-100 rounded-2xl py-3 text-sm font-semibold">닫기</button>
      </div>
    </div>

    <!-- Floating Add button -->
    <a id="addBtn" href="home.html" class="fixed bottom-24 right-6 max-w-md mx-auto w-14 h-14 rounded-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 shadow-lg shadow-emerald-500/30 flex items-center justify-center transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
    </a>

    <!-- Bottom nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100">
      <div class="mx-auto max-w-md grid grid-cols-4 py-2">
        <a href="home.html" class="flex flex-col items-center gap-1 py-1 text-slate-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.5 1.5 0 012.122 0l8.955 8.955M4.5 9.75v10.125a.375.375 0 00.375.375H9v-5.25a1.5 1.5 0 011.5-1.5h3a1.5 1.5 0 011.5 1.5v5.25h4.125a.375.375 0 00.375-.375V9.75" />
          </svg>
          <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="history.html" class="flex flex-col items-center gap-1 py-1 text-indigo-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="text-[10px] font-semibold">History</span>
        </a>
        <a href="reports.html" class="flex flex-col items-center gap-1 py-1 text-slate-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

          </svg>
          <span class="text-[10px] font-medium">Reports</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center gap-1 py-1 text-slate-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28z" />

          <span class="text-[10px] font-medium">Settings</span>

      </div>
    </nav>

  </div>

  <script src="config.js"></script>
  <script src="history.js"></script>
</body>
</html>
