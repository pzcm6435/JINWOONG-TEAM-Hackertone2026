  <style>
    .toggle {
      appearance: none;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: #e2e8f0;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .toggle:checked {
      background: #4f46e5;
    }
    .toggle:checked::after {
      transform: translateX(18px);
    }
  </style>
